version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reliable-agent-backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reliable-agent-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

  redis:
    image: redis:7.4-alpine
    container_name: reliable-agent-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

networks:
  default:
    name: reliable-ai-agent-network
